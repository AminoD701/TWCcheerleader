<head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        /* =========================================
           🎨 運動風字體與核心變數
        ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Oswald:wght@400;700;900&display=swap');

        :root {
            --bg-panel: #111418;
            --bg-card: #1c2128;
            --text-main: #f0f4f8;
            --text-sub: #a0aec0;
            --border-color: #2d3748;
            
            --team-accent: #ffffff;
            --event-accent: #ff5722;
            --schedule-accent: #00e676;
            --fav-accent: #ff4757;
            
            --sport-font: 'Oswald', sans-serif;
            --tc-font: 'Noto Sans TC', sans-serif;
        }

        * { box-sizing: border-box; font-family: var(--tc-font); margin: 0; padding: 0; }

        html, body {
            max-width: 100vw; overflow-x: hidden;
            background-color: #050505; color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column; scroll-behavior: smooth;
        }

        body.no-scroll { overflow: hidden !important; }

        /* =========================================
           🔥 運動員概念輪播背景
        ========================================= */
        .sports-bg-slider {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; background: #000; overflow: hidden;
        }
        .sports-bg-slider::after {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(135deg, rgba(10,12,16,0.92) 0%, rgba(20,25,30,0.85) 100%);
            z-index: 1; pointer-events: none;
        }
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0; filter: grayscale(30%) contrast(110%);
            animation: slideFade 24s infinite; z-index: 0;
        }
        .slide-1 { background-image: url('https://images.unsplash.com/photo-1511886929837-354d827aae26?q=80&w=2000&auto=format&fit=crop'); animation-delay: 0s; } 
        .slide-2 { background-image: url('https://images.unsplash.com/photo-1546519638-68e109498ffc?q=80&w=2000&auto=format&fit=crop'); animation-delay: 8s; } 
        .slide-3 { background-image: url('https://images.unsplash.com/photo-1593787406536-369656f37fb2?q=80&w=2000&auto=format&fit=crop'); animation-delay: 16s; } 
        
        @keyframes slideFade {
            0% { opacity: 0; transform: scale(1.05); }
            10% { opacity: 0.4; transform: scale(1); } 
            33% { opacity: 0.4; transform: scale(1); }
            43% { opacity: 0; transform: scale(1.05); }
            100% { opacity: 0; }
        }

        /* =========================================
           ✨ 華麗入口畫面
        ========================================= */
        .landing-page {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1a1a24 0%, #050505 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 99999; transition: opacity 0.5s ease;
        }
        .landing-content { text-align: center; animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .landing-title { font-size: 3.5rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; text-shadow: 4px 4px 0px rgba(229, 57, 53, 0.8); margin-bottom: 5px; transform: skewX(-5deg);}
        .landing-subtitle { font-family: var(--sport-font); font-size: 1.2rem; color: var(--text-sub); margin-bottom: 50px; letter-spacing: 4px; text-transform: uppercase; }
        .enter-btn { 
            font-family: var(--sport-font); background: #fff; color: #000; padding: 15px 50px; font-size: 1.5rem; font-weight: 900; 
            border: none; border-radius: 2px; transform: skewX(-10deg); cursor: pointer; box-shadow: 6px 6px 0px var(--event-accent);
            transition: all 0.2s; letter-spacing: 2px;
        }
        .enter-btn:hover { background: var(--event-accent); color: #fff; transform: skewX(-10deg) translate(-4px, -4px); box-shadow: 10px 10px 0px rgba(255,87,34,0.3); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           主系統 Header 
        ========================================= */
        .header { background-color: rgba(17, 20, 24, 0.95); padding: 25px 20px 0; border-bottom: 4px solid var(--border-color); z-index: 50; position: relative;}
        .title { font-size: 28px; font-weight: 900; text-align: center; margin-bottom: 25px; letter-spacing: 3px; color: #fff; text-transform: uppercase; }
        .controls-container { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 15px; }
        
        .sport-tabs { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .sport-btn { 
            background: var(--bg-card); border: 2px solid var(--border-color); color: var(--text-sub); padding: 10px 22px; 
            font-size: 14px; font-weight: 900; border-radius: 4px; cursor: pointer; transition: all 0.2s; transform: skewX(-5deg);
        }
        .sport-btn span { transform: skewX(5deg); display: inline-flex; align-items: center; gap: 6px; }
        .sport-btn:hover { border-color: #fff; color: #fff; transform: skewX(-5deg) translateY(-2px); }
        .sport-btn.active { background: #fff; color: #000; border-color: #fff; box-shadow: 4px 4px 0px rgba(255,255,255,0.2); }
        .btn-icon { width: 16px; height: 16px; fill: currentColor; }

        .team-tabs { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; padding-top: 20px; border-top: 2px dashed var(--border-color); }
        .tab-btn { 
            background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-sub); cursor: pointer; border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-width: 110px; height: 95px; padding: 12px;
            transition: all 0.2s;
        }
        .tab-btn.active { 
            background-color: var(--team-accent); color: #111; font-weight: 900;
            box-shadow: 0 0 20px var(--team-accent); border-color: #fff; transform: translateY(-3px);
        }
        .tab-logo { width: 40px; height: 40px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        /* ✨ 吸頂篩選列 */
        .sticky-filter-wrapper { position: sticky; top: 0; z-index: 40; background: rgba(17, 20, 24, 0.98); padding: 15px 20px; border-bottom: 2px solid var(--border-color); box-shadow: 0 10px 20px rgba(0,0,0,0.7); }
        .filters { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }
        .filters input, .filters select { background-color: var(--bg-card); border: 2px solid var(--border-color); color: var(--text-main); padding: 11px 16px; font-size: 14px; font-weight: 700; border-radius: 2px; outline: none; }

        /* =========================================
           ✨ 女孩卡片網格
        ========================================= */
        .grid-container { max-width: 1200px; width: 100%; margin: 30px auto 60px; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { 
            background-color: var(--bg-card); border: 2px solid var(--border-color); border-radius: 4px; overflow: hidden; 
            display: flex; flex-direction: column; transition: all 0.2s; box-shadow: 8px 8px 0px rgba(0,0,0,0.6); cursor: pointer; position: relative; 
        }
        .card:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0px rgba(0,0,0,0.8); border-color: #fff; }
        
        .photo-area { height: 350px; background-color: #000; overflow: hidden; position: relative; border-bottom: 4px solid var(--border-color); }
        .photo-area img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .card:hover .photo-area img { transform: scale(1.05); }

        .fav-btn { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.5); color: #000; font-size: 20px; transition: 0.2s;}
        .fav-btn.active { background: var(--fav-accent); color: #fff; }

        .info-section { padding: 25px; }
        .header-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px dashed var(--border-color); }
        .nickname { font-size: 24px; font-weight: 900; color: var(--team-accent, #fff); line-height: 1; text-transform: uppercase; }
        
        .number { 
            font-family: var(--sport-font); font-size: 20px; font-weight: 900; color: var(--team-accent, #ffeb3b); 
            background: #111418; padding: 4px 12px; border-radius: 4px; border: 2px solid var(--border-color); transform: skewX(-5deg); box-shadow: 3px 3px 0px rgba(0,0,0,0.5);
        }

        .data-grid { display: flex; flex-direction: column; gap: 12px; }
        .data-row { display: flex; justify-content: space-between; font-size: 14px; align-items: center; }
        .data-label { color: var(--text-sub); font-weight: 700; min-width: 65px; }
        .data-value { font-weight: 900; color: #fff; text-align: right; font-family: var(--sport-font); letter-spacing: 0.5px; font-size: 15px;}

        /* 質感去背 IG 圖示 */
        .ig-link { display: inline-flex; vertical-align: middle; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0.9; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.8)); margin-left: 8px; }
        .ig-link:hover { transform: scale(1.2) rotate(-5deg); opacity: 1; filter: drop-shadow(0 0 8px rgba(220,39,67,0.6)); }
        .ig-icon { width: 22px; height: 22px; fill: url(#ig-grad-final); display: block; }

        /* =========================================
           ✨ 彈窗排版 (Bottom Sheet)
        ========================================= */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 10000; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { 
            background: var(--bg-panel); border: 4px solid #fff; border-radius: 4px; 
            width: 100%; max-width: 460px; position: relative; transform: scale(0.9); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 15px 15px 0px rgba(0,0,0,0.6); overflow: hidden; max-height: 90dvh; display: flex; flex-direction: column;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-layout { flex: 1; min-height: 0; display: flex; flex-direction: column; }
        .modal-photo { flex-shrink: 0; width: 100%; height: 400px; object-fit: cover; border-bottom: 6px solid var(--modal-accent, #fff); }
        .modal-body { flex: 1; min-height: 0; padding: 30px; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 60px; }

        .modal-close { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; background: #fff; color: #000; border: none; border-radius: 2px; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; box-shadow: 3px 3px 0px rgba(0,0,0,0.5); }
        .modal-close:hover { background: var(--fav-accent); color: #fff; }

        .modal-number { 
            font-family: var(--sport-font); font-size: 26px; font-weight: 900; color: var(--modal-accent, #ffeb3b); 
            background: #111418; padding: 4px 15px; border-radius: 4px; border: 2px solid var(--border-color); transform: skewX(-5deg);
        }
        .modal-ig-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px; background: #15191e; color: #fff; 
            text-decoration: none; padding: 16px; margin-top: 30px; font-weight: 900; border: 2px solid #2d3748; transition: 0.3s;
        }
        .modal-ig-btn:hover { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); border-color: transparent; }

        /* 應援小日曆 */
        .schedule-jump-btn { transition: 0.2s; cursor: pointer; }
        .schedule-jump-btn:hover { transform: translateY(-3px); box-shadow: 4px 4px 0px rgba(0,0,0,0.6) !important; filter: brightness(1.1); }

        /* =========================================
           ✨ 班表大廳與表格 
        ========================================= */
        .schedule-league-section { width: 100%; max-width: 950px; margin: 0 auto 40px; background: rgba(17,20,24,0.8); padding: 30px; border-radius: 8px; border: 2px solid var(--border-color); }
        .schedule-league-title { font-family: var(--sport-font); font-size: 24px; font-weight: 900; color: #000; padding: 5px 20px; margin-bottom: 20px; transform: skewX(-5deg); display: inline-block; }
        .schedule-teams-grid { display: flex; flex-wrap: wrap; gap: 15px; }
        .schedule-team-btn { 
            background: var(--bg-card); border: 2px solid var(--border-color); padding: 20px; display: flex; align-items: center; gap: 18px; 
            cursor: pointer; width: calc(33.333% - 10px); border-bottom: 4px solid var(--btn-accent); transition: 0.2s; border-radius: 4px;
        }
        .schedule-team-btn:hover { background: #252c36; transform: translateY(-4px); border-color: #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.5);}

        .schedule-wrapper { width: 100%; overflow-x: auto; background: var(--bg-panel); border: 4px solid var(--border-color); box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .schedule-table { width: 100%; border-collapse: collapse; text-align: center; min-width: 750px; }
        .schedule-table th, .schedule-table td { padding: 15px 10px; border: 1px solid var(--border-color); }
        .schedule-table th { background: #1a1e24; position: sticky; top: 0; z-index: 2; border-bottom: 4px solid var(--team-accent); }
        
        .schedule-table td:first-child { font-family: var(--sport-font); font-size: 18px; font-weight: 700; color: #fff; background: #15191e; position: sticky; left: 0; z-index: 1; }
        .schedule-table th:first-child { background: #1a1e24; position: sticky; left: 0; z-index: 3; color: #fff; font-family: var(--sport-font); letter-spacing: 1px; }

        .schedule-girl-img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; border: 2px solid var(--border-color); }
        .schedule-heart { width: 25px; height: 25px; fill: var(--team-accent); filter: drop-shadow(0 0 5px var(--team-accent)); }

        /* =========================================
           ✨ 外籍行程
        ========================================= */
        .event-item { background: var(--bg-card); border-radius: 4px; padding: 25px; display: flex; align-items: center; gap: 25px; border: 2px solid var(--border-color); box-shadow: 6px 6px 0px rgba(0,0,0,0.6); transition: 0.2s; margin-bottom: 20px; }
        .event-item:hover { border-color: #fff; transform: translate(-3px, -3px); box-shadow: 9px 9px 0px rgba(0,0,0,0.8); }
        .event-date-box { background: #fff; color: #000; padding: 15px; border-radius: 4px; text-align: center; transform: skewX(-5deg); min-width: 90px; }
        .event-date-box .mon { font-family: var(--sport-font); font-size: 14px; font-weight: 700; background: var(--event-accent); color: #000; padding: 2px 8px; margin-bottom: 5px; display: inline-block; }
        .event-date-box .day { font-family: var(--sport-font); font-size: 32px; font-weight: 900; line-height: 1; }
        
        .event-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 8px; }
        .event-meta { font-size: 14px; color: var(--text-sub); margin-bottom: 12px; }
        .event-girls { color: var(--event-accent); font-weight: 700; }

        .back-to-top { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: #fff; color: #000; border-radius: 2px; display: flex; align-items: center; justify-content: center; box-shadow: 4px 4px 0px var(--border-color); cursor: pointer; z-index: 90; opacity: 0; visibility: hidden; transition: 0.2s; }
        .back-to-top.show { opacity: 1; visibility: visible; }
        .back-to-top svg { width: 24px; height: 24px; stroke: #000; stroke-width: 3; fill: none; }

        /* =========================================
           ✨ 手機版專屬優化 (橫滑 & Bottom Sheet)
        ========================================= */
        @media (max-width: 768px) {
            .sport-tabs, .team-tabs, .filters { flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start; -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 10px; padding-bottom: 10px; }
            .sport-tabs::-webkit-scrollbar, .team-tabs::-webkit-scrollbar, .filters::-webkit-scrollbar { display: none; }
            .sport-btn, .tab-btn, .filters input, .filters select { flex-shrink: 0; }
            .tab-btn { min-width: 95px; height: 85px; }

            .grid-container { padding: 0 10px; grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .photo-area { height: 180px; }
            .schedule-team-btn { width: 100%; }

            .event-item { flex-direction: column; align-items: flex-start; gap: 15px; }

            .modal-overlay { align-items: flex-end; padding: 0; }
            .modal-content { 
                max-height: 85dvh; max-width: 100%; border-radius: 15px 15px 0 0; border: none; 
                border-top: 5px solid var(--modal-accent, #fff); transform: translateY(100%); transition: transform 0.3s ease-out; margin: 0;
            }
            .modal-overlay.active .modal-content { transform: translateY(0); }
            .modal-photo { height: 380px; } /* 照片不裁切 */
        }

        .back-btn { background: #fff; color: #000; padding: 12px 24px; font-weight: 900; border: none; transform: skewX(-5deg); cursor: pointer; margin-bottom: 25px; box-shadow: 4px 4px 0px var(--border-color); }
        .footer { background-color: rgba(17, 20, 24, 0.95); padding: 45px 20px; text-align: center; border-top: 4px solid var(--border-color); color: var(--text-sub); font-size: 13px; font-weight: 700; line-height: 1.8; margin-top: auto;}
        .footer strong { color: #fff; }
    </style>
</head>
<body class="no-scroll">

    </div>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <linearGradient id="ig-grad-final" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#f09433;" /><stop offset="25%" style="stop-color:#e6683c;" /><stop offset="50%" style="stop-color:#dc2743;" /><stop offset="75%" style="stop-color:#cc2366;" /><stop offset="100%" style="stop-color:#bc1888;" />
            </linearGradient>
            <symbol id="icon-ig" viewBox="0 0 24 24">
                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.332 3.608 1.308.975.975 1.245 2.242 1.308 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.332 2.633-1.308 3.608-.975.975-2.242 1.245-3.608 1.308-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.332-3.608-1.308-.975-.975-1.245-2.242-1.308-3.608.058-1.266-.07-1.646-.07-4.85s.012-3.584.07-4.85c.062-1.366.332-2.633 1.308-3.608.975-.975 2.242-1.245 3.608-1.308 1.266-.058 1.646-.07 4.85-.07zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948s.014 3.667.072 4.947c.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072s3.667-.014 4.947-.072c4.358-.2 6.78-2.618 6.98-6.98.058-1.281.072-1.689.072-4.948s-.014-3.667-.072-4.947c-.2-4.358-2.618-6.78-6.98-6.98-1.281-.058-1.689-.072-4.948-.072zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
            </symbol>
            <symbol id="icon-heart" viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </symbol>
        </defs>
    </svg>

    <script>
        // =========================================
        // 核心資料與狀態管理
        // =========================================
        let dbGirls = [], dbEvents = [], dbSchedules = [];
        let currentMode = "girls", currentSport = "全部", currentTeam = "全部啦啦隊", currentScheduleTeam = null, currentScheduleSport = null;
        let myFavorites = JSON.parse(localStorage.getItem('cheer_favorites')) || [];

        // 完整球隊主題資料庫 (包含代表色與聯盟)
        const teamThemes = {
            "全部啦啦隊": { accent: "#ffeb3b", noLogo: true, league: "" },
            "Wing Stars_棒球": { accent: "#00e676", logo: "images/winstars_logo.png", league: "棒球" },
            "Passion Sisters_棒球": { accent: "#ffeb3b", logo: "images/brothers_logo.png", league: "棒球" },
            "Fubon Angels_棒球": { accent: "#2196f3", logo: "images/fubon_logo.png", league: "棒球" },
            "Uni-Girls": { accent: "#ff9800", logo: "images/unilions_logo.png", league: "棒球" },
            "Rakuten Girls": { accent: "#f44336", logo: "images/rakuten_logo.png", league: "棒球" },
            "Dragon Beauties": { accent: "#e91e63", logo: "images/dragons_logo.png", league: "棒球" },
            "Formosa Sexy": { accent: "#76ff03", noLogo: true, league: "TPBL" },
            "Passion Sisters_籃球": { accent: "#ffeb3b", noLogo: true, league: "TPBL" },
            "Muse Girls": { accent: "#ce93d8", noLogo: true, league: "TPBL" },
            "Taishin Wonders": { accent: "#f44336", noLogo: true, league: "TPBL" },
            "Leopard Girls": { accent: "#ffffff", noLogo: true, league: "TPBL" },
            "New Taipei Queens": { accent: "#ffeb3b", noLogo: true, league: "TPBL" },
            "Aqua Mermaids": { accent: "#03a9f4", noLogo: true, league: "TPBL" },
            "Pilots Crew": { accent: "#ff9800", noLogo: true, league: "P. LEAGUE+" },
            "Youngkey Girls": { accent: "#69f0ae", noLogo: true, league: "P. LEAGUE+" },
            "Wing Stars_籃球": { accent: "#00e676", noLogo: true, league: "P. LEAGUE+" },
            "Fubon Angels_籃球": { accent: "#2196f3", noLogo: true, league: "P. LEAGUE+" },
            "Tokki Cutie": { accent: "#ff9800", noLogo: true, league: "排球" },
            "Little witches": { accent: "#00e5ff", noLogo: true, league: "排球" },
            "Peach Girls": { accent: "#f06292", noLogo: true, league: "排球" }
        };

        // 頁面載入與解析
        async function loadData() {
            const t = new Date().getTime();
            const baseUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT9l-hRhzMwcRdyQHsRs_97fja0Gg4RCcDDMk31u-dSbbQmk_JIUmbPTAj2gaNYmb6bYTwUvv4_1IxN/pub?output=csv";
            
            Papa.parse(`${baseUrl}&gid=0&t=${t}`, {
                download: true, header: true, skipEmptyLines: true,
                transformHeader: h => h.trim().toLowerCase().replace(/[\s_]/g, ""),
                complete: res => {
                    dbGirls = res.data.filter(i => i.realname);
                    Papa.parse(`${baseUrl}&gid=925411186&t=${t}`, {
                        download: true, header: true,
                        complete: resEv => {
                            dbEvents = resEv.data.map(e => ({ ...e, safeDate: parseDateFlexible(e.date) })).filter(e => e.safeDate);
                            Papa.parse(`${baseUrl}&gid=1702657458&t=${t}`, {
                                download: true, header: true,
                                complete: resSch => {
                                    let flat = [];
                                    resSch.data.forEach(row => {
                                        const dStr = row.dates || row.date || "";
                                        const dParts = dStr.split(/[,\s\n、，]+/); // 支援多種符號解析
                                        dParts.forEach(d => {
                                            const p = parseDateFlexible(d);
                                            if(p && row.name) flat.push({ ...row, safeDate: p });
                                        });
                                    });
                                    dbSchedules = flat;
                                    renderContent();
                                }
                            });
                        }
                    });
                }
            });
        }

        // 精密日期解析器
        function parseDateFlexible(dStr) {
            if(!dStr) return null;
            let s = String(dStr).replace(/年|月|-/g, '/').replace(/日/g, '').trim();
            let p = s.split('/');
            if(p.length < 2) return null;
            let y = p.length === 3 ? parseInt(p[0]) : new Date().getFullYear();
            let m = p.length === 3 ? parseInt(p[1]) : parseInt(p[0]);
            let d = p.length === 3 ? parseInt(p[2]) : parseInt(p[1]);
            if(isNaN(m) || isNaN(d)) return null;
            const jsD = new Date(y, m-1, d);
            const weekMap = ["Sun.", "Mon.", "Tue.", "Wed.", "Thu.", "Fri.", "Sat."];
            const monMap = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            return { year:y, month:m, day:d, week: weekMap[jsD.getDay()], monStr: monMap[m-1], num: parseInt(`${y}${String(m).padStart(2,'0')}${String(d).padStart(2,'0')}`) };
        }

        // 滾動回到頂部
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTopBtn');
            if (window.scrollY > 400) btn.classList.add('show');
            else btn.classList.remove('show');
        });

        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

        // UI 狀態切換
        window.setMode = function(mode, sport, btn) {
            document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = mode; currentSport = sport; currentTeam = "全部啦啦隊"; currentScheduleTeam = null;
            
            document.getElementById('extra-filters').style.display = (mode === 'girls' || mode === 'favorites') ? 'flex' : 'none';
            document.getElementById('filter-bar').style.display = (mode === 'schedule') ? 'none' : 'block';
            
            updateTeamTabs();
            renderContent();
        }

        function updateTeamTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = "";
            if (currentMode !== 'girls' || currentSport === "全部") return;
            const teams = [...new Set(dbGirls.filter(g => (g.sport||"").includes(currentSport)).map(g => g.team.trim()))].sort();
            
            const allBtn = document.createElement('button');
            allBtn.className = "tab-btn active";
            allBtn.innerHTML = "<span>全部球隊 ALL</span>";
            allBtn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(tb => tb.classList.remove('active'));
                allBtn.classList.add('active');
                currentTeam = "全部啦啦隊";
                document.documentElement.style.setProperty('--team-accent', "#ffeb3b");
                renderContent();
            };
            container.appendChild(allBtn);

            teams.forEach(t => {
                const btn = document.createElement('button');
                btn.className = "tab-btn";
                const cfg = teamThemes[t] || teamThemes[t + "_" + currentSport] || { accent: "#ccc" };
                btn.style.setProperty('--team-accent', cfg.accent);
                btn.innerHTML = `${(cfg.logo && !cfg.noLogo) ? `<img src="${cfg.logo}" class="tab-logo">` : ''}<span>${t}</span>`;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(tb => tb.classList.remove('active'));
                    btn.classList.add('active');
                    currentTeam = t;
                    document.documentElement.style.setProperty('--team-accent', cfg.accent);
                    renderContent();
                };
                container.appendChild(btn);
            });
        }

        // =========================================
        // 渲染主流程
        // =========================================
        function renderContent() {
            const grid = document.getElementById('grid-container'), ev = document.getElementById('event-container'), sch = document.getElementById('schedule-container');
            grid.style.display = ev.style.display = sch.style.display = "none";
            window.scrollTo({top:0});
            if(currentMode === 'girls' || currentMode === 'favorites') { grid.style.display = "grid"; renderGirls(); }
            else if(currentMode === 'events') { ev.style.display = "flex"; renderEvents(); }
            else if(currentMode === 'schedule') { sch.style.display = "flex"; renderScheduleSelection(); }
        }

        function renderGirls() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const nat = document.getElementById('natFilter').value;
            const sort = document.getElementById('sortFilter').value;

            let list = dbGirls.filter(g => {
                if(currentMode === 'favorites' && !myFavorites.includes(g.realname)) return false;
                if(currentSport !== "全部" && !(g.sport||"").includes(currentSport)) return false;
                if(currentTeam !== "全部啦啦隊" && g.team.trim() !== currentTeam) return false;
                if(search && !(g.realname||"").toLowerCase().includes(search) && !(g.nickname||"").toLowerCase().includes(search)) return false;
                if(nat !== 'all' && !(g.nat||"").includes(nat)) return false;
                return true;
            });

            // 確保相同的人跨隊伍時資料聚合
            if ((currentSport === "全部" && currentTeam === "全部啦啦隊") || currentMode === 'favorites') {
                const mMap = new Map();
                list.forEach(c => { 
                    const k = (c.realname || "").trim(); if (!k) return;
                    if (!mMap.has(k)) mMap.set(k, { ...c, mS: [c.sport || ""], mT: [c.team || ""], mN: [c.num || ""] }); 
                    else { 
                        let e = mMap.get(k); 
                        if (!e.mS.includes(c.sport || "")) e.mS.push(c.sport || ""); 
                        if (!e.mT.includes(c.team || "")) e.mT.push(c.team || ""); 
                        if (!e.mN.includes(c.num || "") && c.num && c.num !== "-") e.mN.push(c.num || ""); 
                    } 
                });
                list = Array.from(mMap.values());
            }

            if (currentMode === 'favorites' && list.length === 0) {
                document.getElementById('grid-container').innerHTML = `<div style="text-align:center; padding:100px 20px; color:var(--text-sub); grid-column: 1 / -1; font-weight:700; line-height:2;">球隊休息室目前是空的！<br>趕快去點擊球員卡右上角的愛心標記，把喜歡的女孩加入名單吧！</div>`;
                return;
            }

            if(sort === 'heightDesc') list.sort((a,b) => (parseFloat(b.height)||0) - (parseFloat(a.height)||0));
            if(sort === 'numberAsc') list.sort((a,b) => (parseInt((a.mN||[a.num])[0])||999) - (parseInt((b.mN||[b.num])[0])||999));

            document.getElementById('grid-container').innerHTML = list.map(g => {
                const teams = (g.mT || [g.team || ""]).map(t => t.trim()).filter(t => t);
                const isFav = myFavorites.includes(g.realname);
                const cfg = teamThemes[teams[0]] || teamThemes[teams[0] + "_" + currentSport] || { accent: "#ffeb3b" };
                const displayNum = (g.mN||[g.num]).filter(n=>n && n!=="-").map(n => '#' + n).join(' ') || "-";

                return `
                <div class="card" style="border-bottom: 6px solid ${cfg.accent}" onclick="openModal('${g.realname}')">
                    <div class="photo-area">
                        <img src="${g.img}" loading="lazy">
                        <div class="fav-btn ${isFav?'active':''}" onclick="event.stopPropagation(); toggleFav('${g.realname}')">❤</div>
                    </div>
                    <div class="info-section">
                        <div class="header-info">
                            <div>
                                <div style="display:flex;align-items:center;">
                                    <div class="nickname" style="color:${cfg.accent}">${g.nickname}</div>
                                    ${g.ig ? `<a href="${g.ig}" target="_blank" class="ig-link" onclick="event.stopPropagation()"><svg class="ig-icon"><use xlink:href="#ig-grad-final"></use></svg></a>` : ''}
                                </div>
                                <div style="font-size:14px;color:var(--text-sub);font-weight:700;margin-top:5px;">${g.realname}</div>
                            </div>
                            <div class="number">${displayNum}</div>
                        </div>
                        <div class="data-grid">
                            <div class="data-row"><span class="data-label">球隊 UNIT</span><span class="data-value" style="color:${cfg.accent}">${teams.join(' / ')}</span></div>
                            <div class="data-row"><span class="data-label">身高 HEIGHT</span><span class="data-value">${g.height ? g.height+'cm' : '-'}</span></div>
                            <div class="data-row"><span class="data-label">星座 SIGN</span><span class="data-value">${g.zodiac || '-'}</span></div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.toggleFav = function(name) {
            if(myFavorites.includes(name)) myFavorites = myFavorites.filter(n => n !== name);
            else myFavorites.push(name);
            localStorage.setItem('cheer_favorites', JSON.stringify(myFavorites));
            renderGirls();
        };

        // =========================================
        // 彈窗與排班直達邏輯
        // =========================================
        window.goToSchedule = function(team, sport) {
            closeModal();
            document.querySelector('.sport-btn.btn-schedule').click();
            currentScheduleTeam = team; currentScheduleSport = sport;
            renderScheduleMatrix();
        };

        window.openModal = function(name) {
            const g = dbGirls.find(i => i.realname === name || i.nickname === name);
            if(!g) return;
            
            const teams = (g.mT || [g.team || ""]).map(t => t.trim()).filter(t => t);
            const cfg = teamThemes[teams[0]] || teamThemes[teams[0] + "_" + currentSport] || { accent: "#ffeb3b" };
            const nums = (g.mN || [g.num || ""]).filter(n => n && n !== "-").map(n => '#' + n);
            document.documentElement.style.setProperty('--modal-accent', cfg.accent);

            // 過濾專屬班表 (本月)
            const today = new Date();
            const todayNum = parseInt(`${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`);
            let herSch = dbSchedules.filter(s => (s.name === g.realname || s.name === g.nickname) && s.safeDate.month === (today.getMonth()+1));

            let schHtml = '';
            if (herSch.length > 0) {
                let uniqueKeys = [];
                let boxes = herSch.sort((a,b)=>a.safeDate.num - b.safeDate.num).map(s => {
                    let key = s.safeDate.num + s.team;
                    if(uniqueKeys.includes(key)) return '';
                    uniqueKeys.push(key);
                    
                    const isPast = s.safeDate.num < todayNum;
                    return `<div class="schedule-jump-btn" onclick="goToSchedule('${s.team}','${s.sport}')" style="background:#111418;border:1px solid ${isPast?'#444':cfg.accent};padding:8px;border-radius:4px;text-align:center;min-width:80px;opacity:${isPast?0.4:1}; box-shadow: 3px 3px 0px rgba(0,0,0,0.5);">
                        <div style="font-size:10px;color:var(--text-sub);font-weight:700;">${s.safeDate.monStr} / ${s.safeDate.week}</div>
                        <div style="font-family:var(--sport-font);font-size:24px;color:#fff;margin:4px 0;font-weight:900;">${String(s.safeDate.day).padStart(2,'0')}</div>
                        <div style="font-size:11px;color:${isPast?'#888':cfg.accent};font-weight:900;">${s.team}</div>
                    </div>`;
                }).join('');
                
                if(boxes.trim() !== '') {
                    schHtml = `<div style="margin-top:20px; border-top:2px dashed var(--border-color); padding-top:20px;">
                        <div style="font-family:var(--sport-font);font-size:18px;color:${cfg.accent};margin-bottom:15px;transform:skewX(-5deg);font-weight:900;">本月應援 SCHEDULE <span style="font-size:12px;color:var(--text-sub);font-family:var(--tc-font);font-weight:normal;">(點擊前往)</span></div>
                        <div style="display:flex;flex-wrap:wrap;gap:12px;">${boxes}</div>
                    </div>`;
                }
            } else {
                schHtml = `<div style="margin-top:20px; border-top:2px dashed var(--border-color); padding-top:20px;">
                    <div style="font-family:var(--sport-font);font-size:18px;color:var(--text-sub);margin-bottom:12px;transform:skewX(-5deg);font-weight:900;">本月應援 SCHEDULE</div>
                    <div style="font-size:14px;color:var(--text-sub);font-weight:700;">本月目前尚無班表。</div>
                </div>`;
            }

            document.getElementById('modal-dynamic-content').innerHTML = `
                <img src="${g.img}" class="modal-photo">
                <div class="modal-body">
                    <div class="modal-header-info">
                        <div><div class="modal-nickname" style="color:${cfg.accent}">${g.nickname}</div><div class="modal-realname">${g.realname}</div></div>
                        <div class="modal-number">${nums.join(' ') || '-'}</div>
                    </div>
                    <div class="modal-data-grid">
                        <div class="modal-data-row"><span class="modal-data-label">球隊 UNIT</span><span class="modal-data-value" style="color:${cfg.accent}">${teams.join(' / ')}</span></div>
                        <div class="modal-data-row"><span class="modal-data-label">國籍 NAT</span><span class="modal-data-value">${g.nat || '-'}</span></div>
                        <div class="modal-data-row"><span class="modal-data-label">身高 HEIGHT</span><span class="modal-data-value">${g.height ? g.height+' cm':'-'}</span></div>
                        <div class="modal-data-row"><span class="modal-data-label">星座 SIGN</span><span class="modal-data-value">${g.zodiac || '-'}</span></div>
                        <div class="modal-data-row"><span class="modal-data-label">生日 DOB</span><span class="modal-data-value">${g.dob || '-'}</span></div>
                        ${g.note ? `<div class="modal-data-row" style="border-top:1px dashed var(--border-color); margin-top:8px; padding-top:12px;"><span class="modal-data-label">備註 NOTE</span><span style="color:var(--event-accent); font-weight:700; text-align:right;">${g.note}</span></div>` : ''}
                    </div>
                    ${schHtml}
                    ${g.ig ? `<a href="${g.ig}" target="_blank" class="modal-ig-btn"><svg class="ig-icon"><use xlink:href="#icon-ig"></use></svg><span>前往 INSTAGRAM</span></a>` : ''}
                </div>
            `;
            document.getElementById('girl-modal').classList.add('active');
            document.body.classList.add('no-scroll');
        };

        window.closeModal = function() { 
            document.getElementById('girl-modal').classList.remove('active'); 
            document.body.classList.remove('no-scroll'); 
        };

        // =========================================
        // 班表渲染
        // =========================================
        window.renderScheduleSelection = function() {
            const container = document.getElementById('schedule-container');
            let available = [];
            dbSchedules.forEach(s => { if(s.team && !available.find(a => a.team === s.team)) available.push(s); });
            
            let leagueGroups = { "棒球": "#00b0ff", "TPBL": "#ff9800", "P. LEAGUE+": "#ffeb3b", "排球": "#ff4081", "其他": "#a0aec0" };
            let html = `<div style="width:100%; display:flex; flex-direction:column; gap:40px; padding:20px 0;">`;
            
            for(let key in leagueGroups) {
                let teams = available.filter(a => {
                    if(key === "其他") return !a.sport.includes("棒球") && !a.sport.includes("籃") && !a.sport.includes("排球") && !teamThemes[a.team];
                    return (a.sport||"").includes(key) || (teamThemes[a.team] && teamThemes[a.team].league === key);
                });
                
                if(teams.length) {
                    html += `<div class="schedule-league-section"><div class="schedule-league-title" style="background:${leagueGroups[key]}">${key} 應援賽程</div><div class="schedule-teams-grid">` +
                    teams.sort((a,b)=>a.team.localeCompare(b.team,'zh-TW')).map(t => {
                        const cfg = teamThemes[t.team] || teamThemes[t.team+"_"+t.sport] || { accent: "#fff" };
                        return `<div class="schedule-team-btn" style="--btn-accent:${cfg.accent}" onclick="currentScheduleTeam='${t.team}';currentScheduleSport='${t.sport}';renderScheduleMatrix(); window.scrollTo({top:0});">
                            ${(cfg.logo && !cfg.noLogo)?`<img src="${cfg.logo}" style="width:45px; height:45px;">`:''}<span>${t.team}</span>
                        </div>`;
                    }).join('') + `</div></div>`;
                }
            }
            container.innerHTML = html + `</div>`;
        };

        window.renderScheduleMatrix = function() {
            const container = document.getElementById('schedule-container');
            let data = dbSchedules.filter(s => s.team === currentScheduleTeam);
            
            // 隱藏過去日期
            const todayNum = parseInt(`${new Date().getFullYear()}${String(new Date().getMonth()+1).padStart(2,'0')}${String(new Date().getDate()).padStart(2,'0')}`);
            data = data.filter(s => s.safeDate.num >= todayNum);
            
            if(data.length === 0) {
                container.innerHTML = `<button class="back-btn" onclick="currentScheduleTeam=null;renderScheduleSelection()"><span><svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:3;vertical-align:middle;margin-right:5px;"><polyline points="15 18 9 12 15 6"></polyline></svg> 返回大廳 BACK</span></button><div style="text-align:center; padding:100px 50px; color:var(--text-sub); font-weight:700; font-size:18px;">此球隊目前無未來班表資料。</div>`;
                return;
            }

            let girls = [...new Set(data.map(s => s.name))].sort((a,b) => a.localeCompare(b,'zh-TW'));
            let dates = [...new Set(data.map(s => s.safeDate.num))].sort((a,b)=>a-b);
            const cfg = teamThemes[currentScheduleTeam] || teamThemes[currentScheduleTeam+"_"+currentScheduleSport] || { accent: "#fff" };

            let html = `<div style="width:100%;"><button class="back-btn" onclick="currentScheduleTeam=null;renderScheduleSelection()"><span>返回大廳 BACK</span></button>`;
            html += `<div class="schedule-wrapper"><table class="schedule-table"><thead><tr><th>ROSTER</th>` + 
                girls.map(n => {
                    const g = dbGirls.find(girl => girl.realname === n || girl.nickname === n);
                    return `<th onclick="openModal('${n}')" style="cursor:pointer;"><div style="display:flex;flex-direction:column;align-items:center;gap:8px;"><img src="${g?g.img:''}" style="width:50px;height:50px;object-fit:cover;border-radius:4px;border:2px solid var(--border-color);"><div style="font-size:13px;color:#fff;font-weight:900;">${g?g.realname:n}</div></div></th>`;
                }).join('') + `</tr></thead><tbody>`;
            
            dates.forEach(dNum => {
                const dInfo = data.find(s => s.safeDate.num === dNum).safeDate;
                html += `<tr><td style="font-family:var(--sport-font);color:#fff;font-weight:700;font-size:16px;">${dInfo.month}/${dInfo.day} <br><span style="font-size:12px;color:var(--text-sub);">${dInfo.week}</span></td>` +
                    girls.map(gn => {
                        const work = data.some(s => s.safeDate.num === dNum && s.name === gn);
                        return `<td>${work?`<svg style="width:24px;height:24px;fill:${cfg.accent};filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`:''}</td>`;
                    }).join('') + `</tr>`;
            });
            container.innerHTML = html + `</tbody></table></div></div>`;
        };

        // =========================================
        // 外籍行程渲染
        // =========================================
        function renderEvents() {
            const todayNum = parseInt(`${new Date().getFullYear()}${String(new Date().getMonth()+1).padStart(2,'0')}${String(new Date().getDate()).padStart(2,'0')}`);
            let filtered = dbEvents.filter(e => {
                const s = document.getElementById('searchInput').value.toLowerCase();
                if (!s) return true;
                const gStr = (e.girls || "").toLowerCase();
                return (e.eventname||"").toLowerCase().includes(s) || gStr.includes(s) || (e.host||"").toLowerCase().includes(s) || dbGirls.some(g => (g.nickname||"").toLowerCase().includes(s) && gStr.includes(g.realname.toLowerCase()));
            });
            
            const up = filtered.filter(e => e.safeDate.num >= todayNum).sort((a,b) => a.safeDate.num - b.safeDate.num); 
            const ex = filtered.filter(e => e.safeDate.num < todayNum).sort((a,b) => b.safeDate.num - a.safeDate.num); 
            
            const buildItem = (e, isExp) => {
                const attend = (e.girls || "").split(/[,\s、，\n]+/).map(n => {
                    if(!n.trim()) return '';
                    const g = dbGirls.find(girl => girl.realname === n.trim() || girl.nickname === n.trim());
                    return `<div onclick="openModal('${g?g.realname:n}')" style="display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;width:75px;">
                        <img src="${g?g.img:''}" style="width:60px;height:60px;border-radius:4px;border:2px solid var(--border-color);object-fit:cover;">
                        <span style="font-size:12px;font-weight:900;color:#fff;">${g?g.realname:n}</span>
                    </div>`;
                }).join('');
                
                return `<div style="background:var(--bg-card); padding:25px; border-left:8px solid ${isExp?'#555':'var(--event-accent)'}; border-radius:4px; display:flex; gap:25px; align-items:flex-start; box-shadow: 6px 6px 0px rgba(0,0,0,0.5); opacity:${isExp?0.6:1}; flex-wrap:wrap;">
                    <div style="text-align:center; min-width:90px; background:#fff; color:#000; padding:15px; border-radius:4px; transform:skewX(-5deg);">
                        <div style="font-family:var(--sport-font);font-size:14px;font-weight:900;background:${isExp?'#555':'var(--event-accent)'};color:${isExp?'#fff':'#000'};padding:2px 6px;">${e.safeDate.monStr}</div>
                        <div style="font-family:var(--sport-font);font-size:36px;font-weight:900;line-height:1.1;margin-top:5px;">${String(e.safeDate.day).padStart(2,'0')}</div>
                    </div>
                    <div style="flex:1; min-width:200px;">
                        <div style="font-size:20px;font-weight:900;margin-bottom:8px;color:#fff;">${e.eventname}</div>
                        <div style="font-size:14px;color:var(--text-sub);font-weight:700;margin-bottom:15px;">🕒 ${e.time || 'TBA'} | 📍 ${e.address || '官網公告'}</div>
                        <div style="display:flex;flex-wrap:wrap;gap:15px;">${attend}</div>
                    </div>
                </div>`;
            };
            
            let html = up.length ? up.map(e=>buildItem(e,false)).join('') : '<div style="text-align:center;padding:50px;color:var(--text-sub);font-weight:700;">目前沒有未來的活動賽事。</div>';
            if(ex.length) html += `<div style="font-family:var(--sport-font);font-size:20px;font-weight:900;color:#fff;margin:40px 0 10px;text-align:center;text-transform:uppercase;letter-spacing:3px;">歷史賽事紀錄 ARCHIVE</div>` + ex.map(e=>buildItem(e,true)).join('');
            document.getElementById('event-container').innerHTML = html;
        }

        window.onload = loadData;
    </script>
</body>
</html>
