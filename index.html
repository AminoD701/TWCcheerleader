<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台灣啦啦隊宇宙資料庫 TW Cheerleader Universe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Orbitron:wght@400;700;900&display=swap');

        :root {
            /* 高科技漸層主題核心配色 */
            --bg-dark: #050110;
            --bg-panel: rgba(15, 2, 35, 0.6); /* Glassmorphism background */
            --tech-blue: #00f2fe; /* 電光藍 */
            --tech-purple: #bc1888; /* 科技紫，IG漸層的一環 */
            --tech-pink: #ff0055; /* 霓虹粉 */
            
            /* 覆蓋原本的 team 變數為系統預設高科技色，保持 JS 相容性 */
            --team-dark: #080115;
            --team-light: rgba(30, 5, 60, 0.5);
            --team-accent: #00f2fe; /* 預設高科技藍 */
            
            --text-main: #ffffff;
            --text-sub: #b0a0d0; /* 淡紫色文字 */
            --border-color: rgba(100, 50, 200, 0.3); /* 帶紫色的細邊框 */
            
            --event-accent: #ffac5c; /* 保持 warm 色用於行程，但加強亮度 */
            --schedule-accent: #00f2fe;
            --fav-accent: #ff0055;
            
            --orbitron: 'Orbitron', sans-serif; /* 科技感數字/英文型 */
        }

        * { box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; }

        html, body {
            max-width: 100vw; overflow-x: hidden;
            background-color: var(--bg-dark);
            /* 深色宇宙漸層背景 */
            background-image: 
                linear-gradient(135deg, #050110 0%, #1a0235 50%, #050110 100%),
                radial-gradient(at 10% 10%, rgba(0, 242, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(188, 24, 136, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            transition: background-color 0.4s ease; min-height: 100vh;
            display: flex; flex-direction: column; scroll-behavior: smooth;
        }
        
        /* 增加細微的科技網格背景紋理 */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(0deg, transparent 24%, rgba(100, 50, 200, 0.05) 25%, rgba(100, 50, 200, 0.05) 26%, transparent 27%, transparent 74%, rgba(100, 50, 200, 0.05) 75%, rgba(100, 50, 200, 0.05) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(100, 50, 200, 0.05) 25%, rgba(100, 50, 200, 0.05) 26%, transparent 27%, transparent 74%, rgba(100, 50, 200, 0.05) 75%, rgba(100, 50, 200, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            z-index: -1;
            pointer-events: none;
        }

        body.no-scroll { overflow: hidden !important; }

        /* =========================================
           ✨ 華麗入口畫面 (修改為科技漸層) ✨
        ========================================= */
        .landing-page {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1a0235 0%, #050110 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 99999; transition: opacity 0.5s ease;
        }
        .landing-content { text-align: center; animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .landing-title { 
            font-family: var(--orbitron);
            font-size: 3rem; font-weight: 900; 
            background: linear-gradient(to right, var(--tech-blue), #ffffff, var(--tech-pink));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px; letter-spacing: 4px; 
            text-shadow: 0 0 30px rgba(0,242,254,0.6);
        }
        .landing-subtitle { font-size: 1.1rem; color: var(--text-sub); margin-bottom: 60px; letter-spacing: 5px; text-transform: uppercase; font-weight: 500; }
        .enter-btn { 
            font-family: var(--orbitron);
            background: transparent; border: 2px solid var(--tech-blue); color: var(--tech-blue); 
            padding: 15px 50px; font-size: 1.2rem; font-weight: 700; border-radius: 5px; /* 更銳利的角 */
            cursor: pointer; transition: all 0.3s; letter-spacing: 3px; outline: none; 
            position: relative; overflow: hidden;
            text-shadow: 0 0 10px var(--tech-blue);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }
        /* 按鈕掃光效果 */
        .enter-btn::after {
            content: '';
            position: absolute; top: -50%; left: -60%; width: 20%; height: 200%;
            background: rgba(255, 255, 255, 0.6);
            transform: rotate(30deg);
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            opacity: 0;
        }
        .enter-btn:hover { 
            background: rgba(0, 242, 254, 0.1); 
            color: #fff; border-color: #fff; 
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.6); 
            transform: translateY(-2px); 
        }
        .enter-btn:hover::after { left: 130%; opacity: 1; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); } 50% { box-shadow: 0 0 25px rgba(0, 242, 254, 0.4); } 100% { box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); } }

        /* =========================================
           主系統 Header (Glassmorphism)
        ========================================= */
        .header { 
            background-color: var(--bg-panel);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 25px 20px 0; position: relative; z-index: 50; 
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .title { 
            font-family: var(--orbitron);
            font-size: 26px; font-weight: 900; margin-bottom: 25px; text-align: center; letter-spacing: 3px; 
            background: linear-gradient(to right, #fff, var(--tech-blue));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-shadow: 0 0 15px rgba(0,242,254,0.5);
        }
        .controls-container { display: flex; flex-direction: column; gap: 18px; max-width: 1200px; margin: 0 auto; padding-bottom: 15px; }
        
        .sport-tabs { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .sport-btn { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); color: var(--text-sub); 
            padding: 10px 24px; font-size: 14px; font-weight: 700; border-radius: 4px; /* 更方正 */
            cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 8px; 
            letter-spacing: 1px;
        }
        .sport-btn:hover { border-color: var(--tech-blue); color: #fff; background: rgba(0,242,254,0.1); transform: translateY(-1px); }
        .sport-btn.active { 
            background: linear-gradient(135deg, var(--tech-blue) 0%, #00d2ff 100%); 
            color: #000; border-color: var(--tech-blue); 
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.6); 
            font-weight: 900;
        }
        .btn-icon { width: 16px; height: 16px; fill: currentColor; }
        
        /* 特別按鈕樣式 */
        .sport-btn.btn-fav { border-color: var(--fav-accent); color: var(--fav-accent); }
        .sport-btn.btn-fav:hover { background: rgba(255, 0, 85, 0.1); border-color: var(--tech-pink); }
        .sport-btn.btn-fav.active { 
            background: linear-gradient(135deg, var(--fav-accent) 0%, #ff4757 100%); 
            color: #ffffff; box-shadow: 0 0 20px rgba(255, 0, 85, 0.6); border-color: var(--fav-accent); 
        }

        .sport-btn.btn-schedule { border-color: #00e676; color: #00e676; } /* 改為螢光綠 */
        .sport-btn.btn-schedule:hover { background: rgba(0, 230, 118, 0.1); border-color: #fff;}
        .sport-btn.btn-schedule.active { 
            background: linear-gradient(135deg, #00e676 0%, #69f0ae 100%); 
            color: #000; box-shadow: 0 0 20px rgba(0, 230, 118, 0.6); border-color: #00e676;
        }

        .sport-btn.btn-event { border-color: var(--event-accent); color: var(--event-accent); }
        .sport-btn.btn-event:hover { background: rgba(255, 172, 92, 0.1); border-color: #fff; }
        .sport-btn.btn-event.active { 
            background: linear-gradient(135deg, var(--event-accent) 0%, #ff9f43 100%); 
            color: #000; box-shadow: 0 0 20px rgba(255, 172, 92, 0.6); border-color: var(--event-accent);
        }

        .team-tabs { 
            display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; 
            padding-top: 20px; border-top: 1px solid var(--border-color); 
        }
        
        .league-group { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 15px; }
        .league-title { 
            font-family: var(--orbitron);
            font-size: 12px; font-weight: 700; color: #7050a0; 
            text-transform: uppercase; letter-spacing: 3px; 
            border-bottom: 1px solid rgba(112, 80, 160, 0.3); 
            width: 80%; text-align: center; padding-bottom: 6px; margin: 10px 0; 
        }
        
        .tab-btn { 
            background: rgba(20, 5, 40, 0.5); border: 1px solid var(--border-color); color: var(--text-sub); 
            cursor: pointer; font-size: 13px; font-weight: 700; border-radius: 4px; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; 
            min-width: 110px; height: 95px; padding: 12px; 
        }
        .tab-btn:hover { border-color: var(--team-accent, var(--tech-blue)); background: rgba(255,255,255,0.05); transform: translateY(-3px); color: #fff; }
        .tab-logo { width: 38px; height: 38px; object-fit: contain; display: block; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3));}
        .tab-btn.active { 
            background-color: var(--team-light); 
            color: #ffffff; 
            border-color: var(--team-accent, var(--tech-blue)); 
            transform: translateY(-3px); 
            box-shadow: 0 5px 20px rgba(0,0,0,0.5), 0 0 15px var(--team-accent, var(--tech-blue)); 
            text-shadow: 0 0 5px #fff;
        }

        /* ✨ 吸頂浮動搜尋列 (修改為玻璃擬態+霓虹發光) ✨ */
        .sticky-filter-wrapper { 
            position: sticky; top: 0; z-index: 40; 
            background: rgba(8, 1, 18, 0.85);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 15px 20px; 
            border-bottom: 1px solid var(--border-color); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
        }
        .filters { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }
        .filters input, .filters select { 
            background-color: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: var(--text-main); 
            padding: 11px 16px; font-size: 13px; border-radius: 4px; outline: none; 
            min-width: 140px; transition: all 0.2s; 
        }
        .filters input:focus, .filters select:focus { 
            border-color: var(--tech-blue); 
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            background-color: rgba(0,0,0,0.5);
        }
        .filters input::placeholder { color: rgba(255,255,255,0.4); }

        #main-content { flex: 1; padding-top: 15px; position: relative; }

        /* =========================================
           ✨ 質感 SVG 元件與按鈕 (科技感修改) ✨
        ========================================= */
        .back-to-top { 
            position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; 
            background: var(--bg-panel); backdrop-filter: blur(5px);
            color: var(--tech-blue); border-radius: 4px; /* 方形 */
            border: 2px solid var(--tech-blue);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); 
            cursor: pointer; z-index: 90; 
            opacity: 0; visibility: hidden; transition: all 0.3s; transform: translateY(20px); 
        }
        .back-to-top svg { width: 24px; height: 24px; stroke: var(--tech-blue); stroke-width: 3; fill: none; transition: all 0.2s;}
        .back-to-top.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .back-to-top:hover { 
            background: var(--tech-blue); 
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.7);
            transform: scale(1.05);
        }
        .back-to-top:hover svg { stroke: #000; }

        .default-avatar { display: flex; align-items: center; justify-content: center; background: #1a102a; border: 2px solid #331555; }
        .default-avatar svg { width: 45%; height: 45%; stroke: #7050a0; stroke-width: 1.5; fill: none; opacity: 0.8; }

        /* =========================================
           ✨ 個人詳細彈窗 (科技終端機風) ✨
        ========================================= */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); 
            display: flex; align-items: center; justify-content: center; 
            z-index: 10000; opacity: 0; visibility: hidden; transition: all 0.3s ease; padding: 20px; 
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { 
            background: rgba(10, 2, 25, 0.95); 
            border: 2px solid rgba(100, 50, 200, 0.5); 
            border-radius: 8px; 
            width: 100%; max-width: 460px; position: relative; 
            transform: scale(0.9); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 25px rgba(100, 50, 200, 0.3);
            overflow: hidden;
        }
        /* 彈窗裝飾線 */
        .modal-content::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(to right, transparent, var(--modal-accent, var(--tech-blue)), transparent);
            box-shadow: 0 0 10px var(--modal-accent, var(--tech-blue));
        }
        
        .modal-overlay.active .modal-content { transform: scale(1); }
        
        .modal-close { 
            position: absolute; top: 15px; right: 15px; width: 36px; height: 36px; 
            background: rgba(0,0,0,0.6); color: var(--tech-blue); 
            border: 1px solid var(--tech-blue); border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 10; transition: all 0.2s; backdrop-filter: blur(5px); 
        }
        .modal-close svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 3; fill: none; }
        .modal-close:hover { background: var(--fav-accent); color: #fff; border-color: var(--fav-accent); box-shadow: 0 0 15px rgba(255,0,85,0.5); }
        
        .modal-layout { display: flex; flex-direction: column; max-height: 88dvh; overflow: hidden; }
        .modal-photo { 
            flex-shrink: 0; width: 100%; height: 390px; 
            object-fit: cover; object-position: top center; 
            border-bottom: 2px solid var(--modal-accent, var(--tech-blue)); 
            filter: drop-shadow(0 0 15px rgba(0,0,0,0.5));
        }
        .modal-body { padding: 30px; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: max(35px, env(safe-area-inset-bottom)); }
        
        .modal-header-info { 
            display: flex; justify-content: space-between; align-items: flex-start; 
            border-bottom: 1px solid #331555; padding-bottom: 18px; margin-bottom: 18px; 
        }
        .modal-nickname { 
            font-size: 30px; font-weight: 900; 
            color: var(--modal-accent, #fff); 
            line-height: 1.1; margin-bottom: 6px; 
            text-shadow: 0 0 15px var(--modal-accent, rgba(255,255,255,0.5));
        }
        .modal-realname { font-size: 14px; color: var(--text-sub); letter-spacing: 1.5px; }
        .modal-number { 
            font-family: var(--orbitron);
            font-size: 26px; font-weight: 900; color: #fff; 
            background: rgba(0,0,0,0.4); padding: 6px 16px; border-radius: 4px; 
            border: 1px solid #331555; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .modal-data-grid { display: flex; flex-direction: column; gap: 14px; }
        .modal-data-row { display: flex; justify-content: space-between; font-size: 14px; align-items: center; }
        .modal-data-label { color: var(--text-sub); }
        .modal-data-value { font-weight: 700; color: #fff; text-align: right; }
        
        /* 高級感 IG 按鈕 (科技漸層版) */
        .modal-ig-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; 
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
            color: #fff; text-decoration: none; padding: 15px; border-radius: 4px; 
            font-weight: 700; font-size: 15px; margin-top: 30px; transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative; overflow: hidden;
        }
        .modal-ig-btn::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(255,255,255,0.2), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .modal-ig-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(220, 39, 67, 0.4); }
        .modal-ig-btn:hover::before { opacity: 1; }
        .modal-ig-btn svg { width: 18px; height: 18px; fill: #fff; position: relative; z-index: 1; }
        .modal-ig-btn span { position: relative; z-index: 1; letter-spacing: 1px; }

        /* =========================================
           ✨ 班表專屬大廳 (科技選單風) ✨
        ========================================= */
        .schedule-selection-wrapper { display: flex; flex-direction: column; gap: 40px; align-items: center; width: 100%; padding: 25px 0; }
        .schedule-league-section { width: 100%; max-width: 950px; display: flex; flex-direction: column; align-items: center; }
        .schedule-league-title { 
            font-family: var(--orbitron);
            color: #fff; font-size: 16px; font-weight: 700; 
            border-left: 4px solid var(--schedule-accent); 
            padding: 2px 12px; margin-bottom: 25px; letter-spacing: 2px; 
            width: 100%; text-align: left; 
            text-shadow: 0 0 10px var(--schedule-accent);
        }
        .schedule-teams-grid { display: flex; flex-wrap: wrap; gap: 18px; justify-content: flex-start; width: 100%; }
        .schedule-team-btn { 
            background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 8px; 
            padding: 20px; display: flex; align-items: center; gap: 18px; 
            cursor: pointer; transition: all 0.3s; width: calc(33.333% - 12px); 
            position: relative; overflow: hidden; 
            backdrop-filter: blur(5px);
        }
        /* 按鈕左側裝飾線 */
        .schedule-team-btn::before { content: ''; position: absolute; left: 0; top: 15%; bottom: 15%; width: 3px; background: var(--btn-accent, #fff); box-shadow: 0 0 10px var(--btn-accent); }
        /* 按鈕hover背景漸層 */
        .schedule-team-btn::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            opacity: 0; transition: opacity 0.3s;
        }
        
        .schedule-team-btn:hover { 
            border-color: var(--schedule-accent); 
            transform: translateY(-4px) scale(1.02); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(0, 242, 254, 0.2); 
            background-color: rgba(30, 5, 60, 0.4);
        }
        .schedule-team-btn:hover::after { opacity: 1; }
        
        .schedule-team-btn img { width: 50px; height: 50px; object-fit: contain; position: relative; z-index: 1; filter: drop-shadow(0 0 5px rgba(255,255,255,0.2)); }
        
        /* 質感字母徽章 */
        .no-logo-icon { 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, #2a1050, #100220); 
            border-radius: 4px; border: 1px solid #402060; 
            font-family: serif; font-style: italic; font-size: 24px; font-weight: bold; 
            position: relative; z-index: 1; box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        .schedule-team-btn span { color: #fff; font-weight: 700; font-size: 16px; letter-spacing: 1px; position: relative; z-index: 1; }

        .back-btn { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); color: var(--text-sub); 
            padding: 11px 22px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 700; 
            transition: all 0.2s; margin-bottom: 25px; align-self: flex-start; 
            display: inline-flex; align-items: center; gap: 8px; 
            letter-spacing: 1px;
        }
        .back-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 3; fill: none; }
        .back-btn:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: var(--tech-blue); box-shadow: 0 0 15px rgba(0,242,254,0.3); }

        /* =========================================
           官方動態班表矩陣 (數據終端風)
        ========================================= */
        .schedule-matrix-container { max-width: 1150px; width: 100%; margin: 10px auto 50px; padding: 0 20px; display: flex; flex-direction: column; align-items: center; }
        .schedule-wrapper { 
            width: 100%; overflow-x: auto; 
            background: rgba(10, 2, 25, 0.7); 
            backdrop-filter: blur(5px);
            border-radius: 8px; border: 1px solid #331555; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            padding-bottom: 5px; 
        }
        .schedule-table { width: 100%; border-collapse: collapse; text-align: center; min-width: 750px; table-layout: fixed; }
        .schedule-table th, .schedule-table td { padding: 18px 8px; border-bottom: 1px solid #2a1050; border-right: 1px solid #2a1050; }
        .schedule-table th { 
            background: rgba(20, 5, 40, 0.9);

        const monthMap = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        const weekMap = ["Sun.", "Mon.", "Tue.", "Wed.", "Thu.", "Fri.", "Sat."];

        // 解析日期，支援 MM/DD 或 YYYY/MM/DD
        function parseDateFlexible(dStr) {
            if(!dStr) return null;
            let s = String(dStr).replace(/年|月|-/g, '/').replace(/日/g, '').trim();
            let p = s.split('/').filter(x => x !== '');
            let y, m, d;
            if(p.length >= 3) { y = parseInt(p[0]); m = parseInt(p[1]); d = parseInt(p[2]); }
            else if(p.length === 2) { y = new Date().getFullYear(); m = parseInt(p[0]); d = parseInt(p[1]); }
            else return null;
            if(isNaN(m) || isNaN(d)) return null;
            let jsDate = new Date(y, m-1, d);
            return { year:y, month:m, day:d, week:weekMap[jsDate.getDay()], num:parseInt(`${y}${String(m).padStart(2,'0')}${String(d).padStart(2,'0')}`), monStr: monthMap[m-1] };
        }

        // 解析女孩生日用於排序 (MMDD)
        function parseGirlDOB(d) {
            if(!d) return { num:0, mmdd:9999 };
            let s = String(d).replace(/年|月|-/g, '/').replace(/日/g, '').trim();
            let p = s.split('/').filter(x => x !== '');
            let y=0, m=0, d_val=0;
            if(p.length >= 3) { y = parseInt(p[0]); m = parseInt(p[1]); d_val = parseInt(p[2]); } 
            else if(p.length === 2) { m = parseInt(p[0]); d_val = parseInt(p[1]); }
            return { num: parseInt(`${String(y).padStart(4,'0')}${String(m).padStart(2,'0')}${String(d_val).padStart(2,'0')}`), mmdd: parseInt(`${String(m).padStart(2,'0')}${String(d_val).padStart(2,'0')}`) };
        }

        let dbGirls = []; let dbEvents = []; let dbSchedules = [];
        let currentMode = "girls"; let currentSport = "全部"; let currentTeam = "全部啦啦隊";
        let currentScheduleTeam = null; 
        let currentScheduleSport = null; 

        // 全域資料讀取
        function loadData() {
            const t = new Date().getTime(); // 防止快取
            Papa.parse(`${baseSheetUrl}&gid=${girlsGid}&t=${t}`, {
                download: true, header: true, skipEmptyLines: true,
                transformHeader: h => h.trim().toLowerCase().replace(/[\s_]/g, ""),
                complete: res => {
                    dbGirls = res.data.filter(i => i.realname);
                    // 讀取行程
                    Papa.parse(`${baseSheetUrl}&gid=${eventsGid}&t=${t}`, {
                        download: true, header: true, skipEmptyLines: true,
                        transformHeader: h => h.trim().toLowerCase().replace(/[\s_]/g, ""),
                        complete: resEv => { 
                            dbEvents = resEv.data.map(e => { e.safeDate = parseDateFlexible(e.date); return e; }).filter(e => e.safeDate !== null); 
                            // 讀取班表
                            Papa.parse(`${baseSheetUrl}&gid=${schedulesGid}&t=${t}`, {
                                download: true, header: true, skipEmptyLines: true,
                                transformHeader: h => h.trim().toLowerCase().replace(/[\s_]/g, ""),
                                complete: resSch => {
                                    let flatSch = [];
                                    resSch.data.forEach(row => {
                                        let sport = (row.sport || "").trim();
                                        let team = (row.team || "").trim();
                                        // 欄位可能為 name 或 nickname 或 綽號
                                        let name = (row.name || row.nickname || row['綽號'] || "").trim();
                                        let datesRaw = (row.dates || row.date || "").split(/[,\s、，\n]+/);
                                        datesRaw.forEach(dStr => {
                                            let p = parseDateFlexible(dStr);
                                            if(p && name) flatSch.push({ sport: sport, team: team, name: name, safeDate: p });
                                        });
                                    });
                                    dbSchedules = flatSch;
                                    init();
                                }
                            });
                        }
                    });
                }
            });
        }

        // 初始化 UI 事件
        function init() {
            document.querySelectorAll('.sport-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentMode = btn.getAttribute('data-mode');
                    if (currentMode === 'schedule') { 
                        currentScheduleTeam = null; 
                        currentScheduleSport = null; 
                    }
                    else if (currentMode === 'girls') { 
                        currentSport = btn.getAttribute('data-sport') || "全部"; 
                        currentTeam = "全部啦啦隊"; 
                    }
                    
                    // 控制篩選列與標籤頁顯示
                    document.getElementById('extra-filters').style.display = (currentMode === 'girls' || currentMode === 'favorites') ? 'flex' : 'none';
                    document.getElementById('filter-bar').style.display = (currentMode === 'schedule') ? 'none' : 'block';
                    
                    updateTeamTabs();
                    // 應用主題 (班表大廳使用預設科技色)
                    applyTheme(currentMode === 'schedule' ? "全部啦啦隊" : currentTeam);
                };
            });
            updateTeamTabs();
            // 綁定篩選事件
            ['searchInput', 'natFilter', 'zodiacFilter', 'sortFilter'].forEach(id => document.getElementById(id).addEventListener('input', renderContent));
        }

        // 應用球隊主題配色
        function applyTheme(tName) {
            const safeTeam = (tName || "").trim();
            const safeSport = currentSport === "全部" ? "" : currentSport;
            // 優先匹配 球隊_運動，再匹配 球隊
            const config = teamThemes[`${safeTeam}_${safeSport}`] || teamThemes[safeTeam] || teamThemes["全部啦啦隊"];
            
            // 這裡不需修改 CSS variables，因為 CSS 已經將背景改為科技漸層，
            // 只需要保持 --team-accent 等變數供卡片和 active 狀態使用即可。
            document.documentElement.style.setProperty('--team-dark', config.dark);
            document.documentElement.style.setProperty('--team-light', config.light);
            document.documentElement.style.setProperty('--team-accent', config.accent);
        }

        // 更新球隊標籤頁
        function updateTeamTabs() {
            const container = document.getElementById('tabs-container');
            // 特殊模式或全部女孩不顯示球隊標籤
            if (currentMode === 'schedule' || currentMode === 'events' || currentMode === 'favorites' || (currentMode === 'girls' && currentSport === "全部")) { 
                container.style.display = 'none'; renderContent(); return; 
            }
            const teamsSet = new Set();
            dbGirls.forEach(c => { if ((c.sport || "").includes(currentSport)) if (c.team && c.team.trim() !== "") teamsSet.add(c.team.trim()); });
            const activeTeams = Array.from(teamsSet).sort();
            container.innerHTML = ''; container.style.display = 'flex';
            
            // 新增「全部啦啦隊」按鈕
            container.appendChild(createTeamBtn("全部啦啦隊"));
            
            if (currentSport === "籃球") {
                const getLeague = (t) => (teamThemes[`${t}_籃球`] || teamThemes[t] || {}).league;
                renderLeagueGroup(container, "TPBL 職籃聯盟", activeTeams.filter(t => getLeague(t) === "TPBL"));

            } else { activeTeams.forEach(t => container.appendChild(createTeamBtn(t))); }

        function renderLeagueGroup(container, title, teams) {
            if(teams.length === 0) return;

        // 創建球隊按鈕
        function createTeamBtn(tName) {
            const safeTeam = (tName || "").trim();

            btn.className = `tab-btn ${safeTeam === currentTeam ? 'active' : ''}`;

            btn.innerHTML = `${logoHtml}<span>${safeTeam}</span>`;

        window.selectScheduleTeam = function(t, sp) { 
            currentScheduleTeam = t; currentScheduleSport = sp;
            // 應用球隊主題

        // 主渲染邏輯
        function renderContent() {
            const grid = document.getElementById('grid-container'); const list = document.getElementById('event-container'); const sched = document.getElementById('schedule-container');
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            // 隱藏所有區域

            // 滾動回頂部
            window.scrollTo({top: 0});
            
            if (currentMode === 'girls' || currentMode === 'favorites') { grid.style.display = 'grid'; renderGirls(grid, search); }
            else if (currentMode === 'events') { list.style.display = 'flex'; renderEvents(list, search); }
            else if (currentMode === 'schedule') { sched.style.display = 'flex'; renderSchedule(sched); }
        }

        // --- 渲染：應援班表 (數據終端風) ---
        function renderSchedule(container) {
            // 模式1：球隊選擇大廳
            if (!currentScheduleTeam) {
                // 獲取所有有班表的 球隊+運動 組合
                let availablePairs = [];
                dbSchedules.forEach(s => {
                    let key = `${(s.team||"").trim()}|${(s.sport||"").trim()}`;
                    if(s.team && !availablePairs.some(p => p.key === key)) {
                        availablePairs.push({ team: (s.team||"").trim(), sport: (s.sport||"").trim(), key: key });
                    }
                });

                if (availablePairs.length === 0) {
                   container.innerHTML = '<div style="text-align:center; padding:100px 50px; color:#888; font-family:var(--orbitron); letter-spacing:2px;">> NO_SCHEDULE_DATA_FOUND</div>';
                   return;
                }
                
                // 分組球隊
                let groups = { "CPBL 職業棒球": [], "TPBL 職籃聯盟": [], "P. LEAGUE+ 職籃聯盟": [], "職業排球": [], "其他活動": [] };
                
                availablePairs.forEach(p => {
                    let t = p.team; let sp = p.sport;
                    let cfgKey = teamThemes[`${t}_${sp}`] ? `${t}_${sp}` : t;
                    let league = (teamThemes[cfgKey] || {}).league;
                    
                    if (league === "TPBL") groups["TPBL 職籃聯盟"].push(p);
                    else if (league === "P. LEAGUE+") groups["P. LEAGUE+ 職籃聯盟"].push(p);
                    else if (league === "排球" || sp.includes("排球") || t.includes("排球")) groups["職業排球"].push(p);
                    else if (league === "CPBL" || sp.includes("棒球") || t.includes("棒球") || ["Wing Stars", "Passion Sisters", "Fubon Angels", "Uni-Girls", "Rakuten Girls", "Dragon Beauties"].includes(t)) groups["CPBL 職業棒球"].push(p);
                    else groups["其他活動"].push(p);
                });

                let html = `<div class="schedule-selection-wrapper">`;
                for(let [gName, pList] of Object.entries(groups)) {
                    if(pList.length === 0) continue;
                    html += `<div class="schedule-league-section"><div class="schedule-league-title">${gName}</div><div class="schedule-teams-grid">`;
                    // 排序組合
                    pList.sort((a,b)=>a.team.localeCompare(b.team, 'zh-TW')).forEach(p => {
                        let t = p.team; let sp = p.sport;
                        let cfgKey = teamThemes[`${t}_${sp}`] ? `${t}_${sp}` : t;
                        let cfg = teamThemes[cfgKey] || { accent: "#ccc" };
                        let logoHtml = (cfg.logo && !cfg.noLogo) ? `<img src="${cfg.logo}">` : `<div class="no-logo-icon" style="color:${cfg.accent}">${t.charAt(0)}</div>`;
                        html += `<div class="schedule-team-btn" style="--btn-accent: ${cfg.accent}" onclick="selectScheduleTeam('${t}', '${sp}')">${logoHtml}<span>${t}</span></div>`;
                    });
                    html += `</div></div>`;
                }
                container.innerHTML = html + `</div>`;
                return;
            }

            // 模式2：顯示特定球隊班表矩陣
            let teamData = dbSchedules.filter(s => s.team === currentScheduleTeam && s.sport === currentScheduleSport);
            let html = `<button class="back-btn" onclick="backToScheduleSelection()"><svg class="back-icon" viewBox="0 0 24 24"><use xlink:href="#icon-back"></use></svg>返回選擇大廳 BACK TO MENU</button>`;
            
            if(teamData.length === 0) {
                html += '<div style="text-align:center; padding:100px 50px; color:#888; font-family:var(--orbitron);">> ERROR: DATA_STR_EMPTY</div>';
                container.innerHTML = html;
                return;
            }

            // 獲取所有日期與女孩 (排序)
            let dates = [...new Set(teamData.map(s => s.safeDate.num))].sort((a,b)=>a-b);
            let girls = [...new Set(teamData.map(s => s.name))];
            
            // 女孩排序：韓->日->外籍->本國->練習生 (班表專用排序)
            girls.sort((nameA, nameB) => {
                const getWeight = (name) => {
                    let g = dbGirls.find(girl => (girl.realname || "").trim() === name || (girl.nickname || "").trim() === name);
                    if (!g) return 6; // 找不到資料排最後
                    let note = (g.note || g['備註'] || g.備註 || "");
                    if (note.includes('練習生') || note.includes('培訓生')) return 5;
                    let nat = g.nat || "";
                    if (nat.includes("韓國")) return 1;
                    if (nat.includes("日本")) return 2;
                    if (nat.includes("臺灣") || nat.includes("台灣")) return 4;
                    return 3; // 其他國籍
                };
                let wA = getWeight(nameA); let wB = getWeight(nameB);
                if (wA !== wB) return wA - wB;
                return nameA.localeCompare(nameB, 'zh-TW'); // 同權重按姓名排序
            });

            // 構建表格 HTML
            html += `<div class="schedule-wrapper"><table class="schedule-table"><thead><tr><th>DATA_FIELD</th>`;
            girls.forEach(name => {
                let g = dbGirls.find(girl => (girl.realname || "").trim() === name || (girl.nickname || "").trim() === name);
                let showReal = g ? g.realname : name;
                let showNick = (g && g.nickname && g.nickname !== g.realname) ? g.nickname : "";
                // 點擊頭像或名字開啟 Modal
                html += `<th><div class="schedule-girl-col" onclick="openModal('${showReal}')">${g?`<img src="${g.img}" class="schedule-girl-img">`:`<div class="schedule-girl-img default-avatar"><svg viewBox="0 0 24 24"><use xlink:href="#icon-user"></use></svg></div>`}<div class="schedule-girl-name-container"><span class="schedule-girl-name">${showReal}</span>${showNick?`<span class="schedule-girl-nickname">${showNick}</span>`:''}</div></div></th>`;
            });
            html += `</tr></thead><tbody>`;
            // 填充日期行
            dates.forEach(dNum => {
                let dInfo = teamData.find(s => s.safeDate.num === dNum).safeDate;
                html += `<tr><td><div class="schedule-date">${dInfo.month}/${String(dInfo.day).padStart(2,'0')}</div><div class="schedule-day">${dInfo.week}</div></td>`;
                // 填充女孩應援狀態
                girls.forEach(name => {
                    let hasWork = teamData.some(s => s.safeDate.num === dNum && s.name === name);
                    html += `<td>${hasWork?`<svg class="schedule-heart"><use xlink:href="#icon-heart"></use></svg>`:''}</td>`;
                });
                html += `</tr>`;
            });
            container.innerHTML = html + `</tbody></table></div>`;
        }

        // --- 渲染：外籍行程 (數據中心風) ---
        function renderEvents(container, search) {
            const todayNum = parseInt(`${new Date().getFullYear()}${String(new Date().getMonth()+1).padStart(2,'0')}${String(new Date().getDate()).padStart(2,'0')}`);
            // 篩選與搜尋
            let filtered = dbEvents.filter(e => {
                if (search === "") return true;
                const girlsStr = (e.girls || "").toLowerCase();
                // 匹配活動名、出席女孩、主辦
                if ((e.eventname||"").toLowerCase().includes(search) || girlsStr.includes(search) || (e.host||"").toLowerCase().includes(search)) return true;
                // 匹配綽號
                return dbGirls.some(g => (g.nickname||"").toLowerCase().includes(search) && girlsStr.includes(g.realname.toLowerCase()));
            });
            // 排序 (日期先後)
            filtered.sort((a,b) => a.safeDate.num - b.safeDate.num);
            
            const up = filtered.filter(e => e.safeDate.num >= todayNum); // 未來
            const ex = filtered.filter(e => e.safeDate.num < todayNum).reverse(); // 過去 (反序)
            
            const buildItemHtml = (e, isExp) => {
                const attendHtml = (e.girls || "").split(/[,\s、，\n]+/).map(n => {
                    const name = n.trim(); if(!name) return '';
                    const g = dbGirls.find(girl => girl.realname.trim() === name || girl.nickname.trim() === name);
                    let showNick = (g && g.nickname && g.nickname !== g.realname) ? g.nickname : "";
                    return `<div class="girl-hero-card" onclick="openModal('${g?g.realname:name}')">${g?`<img src="${g.img}" class="girl-hero-img">`:`<div class="girl-hero-img default-avatar"><svg viewBox="0 0 24 24"><use xlink:href="#icon-user"></use></svg></div>`}<div class="girl-hero-name-container"><span class="girl-hero-name">${g?g.realname:name}</span>${showNick?`<span class="girl-hero-nickname">${showNick}</span>`:''}</div></div>`;
                }).join('');
                return `<div class="event-item ${isExp?'expired':''}">${isExp?'<div class="expired-badge">已結束 PAST</div>':''}<div class="event-date-box"><span class="date-month">${e.safeDate.monStr}</span><span class="date-day">${String(e.safeDate.day).padStart(2,'0')}</span></div><div class="event-content-wrapper"><div class="event-girls-hero">${attendHtml}</div><div class="event-details-sub"><div class="event-title-small">${e.eventname||"數據傳輸中..."}</div><div class="event-meta-row"><span class="meta-item"><i>🕒</i> ${e.time||"TBA"}</span><span class="meta-item"><i>📍</i> ${e.address||"聯絡官網"}</span>${e.host?`<span class="meta-item"><i>🏢</i> ${e.host}</span>`:''}</div></div></div></div>`;
            };
            
            let html = up.length?up.map(e=>buildItemHtml(e,false)).join(''):(search===""?'<div style="text-align:center;padding:100px 50px;color:#666; font-family:var(--orbitron); letter-spacing:2px;">> NO_UPCOMING_EVENTS</div>':'');
            if(ex.length) html += `<div class="event-section-divider">歷史封存 DATA_ARCHIVE</div>` + ex.map(e=>buildItemHtml(e,true)).join('');
            container.innerHTML = html;
        }

        // --- 渲染：女孩卡片 (玻璃擬態+霓虹) ---
        function renderGirls(container, search) {
            const nat = document.getElementById('natFilter').value, zodiac = document.getElementById('zodiacFilter').value, sort = document.getElementById('sortFilter').value;
            // 基礎篩選 (模式、類別、球隊、國籍、星座)
            let result = dbGirls.filter(c => {
                if (currentMode === 'favorites' && !myFavorites.includes(c.realname)) return false;
                const ms = currentSport === "全部" || (c.sport || "").includes(currentSport);
                const mt = currentTeam === "全部啦啦隊" || (c.team || "").trim() === currentTeam;
                const mS = search === "" || (c.nickname || "").toLowerCase().includes(search) || (c.realname || "").toLowerCase().includes(search);
                const mN = nat === 'all' || (c.nat || "").includes(nat);
                // 星座容錯
                const cz = (c.zodiac || "").trim().replace("魔羯","摩羯").replace("白羊","牡羊");
                return (currentMode === 'favorites' ? true : (ms && mt)) && mS && mN && (zodiac === 'all' || cz === zodiac);
            });

            // 跨區模式資料聚合 (真名唯一)
            if ((currentSport === "全部" && currentTeam === "全部啦啦隊") || currentMode === 'favorites') {
                const mMap = new Map();
                result.forEach(c => { 
                    const k = (c.realname || "").trim(); if (!k) return;
                    if (!mMap.has(k)) mMap.set(k, { ...c, mS: [c.sport || ""], mT: [c.team || ""], mN: [c.num || ""] }); 
                    else { 
                        let e = mMap.get(k); 
                        if (!e.mS.includes(c.sport || "")) e.mS.push(c.sport || ""); 
                        if (!e.mT.includes(c.team || "")) e.mT.push(c.team || ""); 
                        if (!e.mN.includes(c.num || "") && c.num && c.num !== "-") e.mN.push(c.num || ""); 
                    } 
                });
                result = Array.from(mMap.values());
            }

            if (currentMode === 'favorites' && result.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:100px 50px; color:#888; grid-column: 1 / -1; font-family:var(--orbitron); letter-spacing:1px; line-height:2;">您還沒有收藏任何女孩喔！<br>趕快去點擊卡片右上角的愛心標記吧！<br>> STATUS: EMPTY_FAV_LIST</div>`;
                return;
            }

            // 排序 (預設: 韓日台)
            const w = {"韓國":1, "日本":2, "臺灣":4, "台灣":4};
            result.sort((a,b) => {
                if(sort === 'default') { let wA = w[a.nat] || 3; let wB = w[b.nat] || 3; return wA - wB; }
                if(sort === 'birthdayAsc') return parseGirlDOB(a.dob).mmdd - parseGirlDOB(b.dob).mmdd;
                if(sort === 'ageAsc') return parseGirlDOB(b.dob).num - parseGirlDOB(a.dob).num; // 年紀大->小
                if(sort === 'heightDesc') return (parseFloat(b.height) || 0) - (parseFloat(a.height) || 0);
                if(sort === 'numberAsc') return (parseInt(a.num) || 999) - (parseInt(b.num) || 999);
                return 0;
            });

            // 渲染卡片 HTML
            container.innerHTML = result.map(c => {
                const teams = (c.mT || [c.team || ""]).map(t => t.trim()).filter(t => t);
                const sports = (c.mS || [c.sport || ""]);
                // 獲取該卡片配色
                const cardAccent = (teamThemes[`${teams[0]}_${currentSport==="全部"?"":currentSport}`] || teamThemes[teams[0]] || teamThemes["全部啦啦隊"]).accent;
                const isFav = myFavorites.includes(c.realname);
                
                let sportTags = sports.map(s=>`<div class="sport-tag tag-${s.includes("棒")?'baseball':s.includes("籃")?'basketball':'volleyball'}">${s}</div>`).join('');
                let displayNum = (c.mN||[c.num]).filter(n=>n && n!=="-").join('<br>') || "-";

                return `
                <div class="card" style="border-top: 3px solid ${cardAccent}; --team-accent: ${cardAccent}" onclick="openModal('${c.realname}')">
                    <div class="photo-area">
                        <div class="sport-tags">${sportTags}</div>
                        <div class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${c.realname}', event)">
                            <svg class="fav-icon" viewBox="0 0 24 24"><use xlink:href="#icon-heart"></use></svg>
                        </div>
                        ${c.img?`<img src="${c.img}" style="width:100%;height:100%;object-fit:cover;object-position:top center;">`:''}
                    </div>
                    <div class="info-section">
                        <div class="header-info">
                            <div>
                                <div class="nickname-container">
                                    <div class="nickname">${c.nickname}</div>
                                    ${c.ig?`<a href="${c.ig}" target="_blank" class="ig-link" onclick="event.stopPropagation()"><svg class="ig-icon"><use xlink:href="#icon-ig"></use></svg></a>`:''}
                                </div>
                                <div class="realname">${c.realname}</div>
                            </div>
                            <div class="number">${displayNum}</div>
                        </div>
                        <div class="data-grid">
                            <div class="data-row"><span class="data-label">啦啦隊 UNIT</span><span class="data-value" style="color:${cardAccent}">${teams.join('<br>')}</span></div>
                            <div class="data-row"><span class="data-label">國籍 NAT</span><span class="data-value">${c.nat || "-"}</span></div>
                            <div class="data-row"><span class="data-label">生日 DOB</span><span class="data-value">${c.dob || "-"}</span></div>
                            <div class="data-row"><span class="data-label">星座 ZODIAC</span><span class="data-value">${c.zodiac || "-"}</span></div>
                            <div class="data-row"><span class="data-label">身高 HEIGHT</span><span class="data-value">${c.height ? c.height + ' cm' : '-'}</span></div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
        
        // 頁面載入後讀取資料
        window.onload = loadData;
    </script>
</body>
</html>
